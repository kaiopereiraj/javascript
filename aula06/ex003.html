<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro código JS</title>
    <style>
        body {
            background-color: #1d1d57;
            color: #fff;
            font: normal 1.5em Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <!-- Primeira aula "prática" de JS -->
    <h1>Olá, mundo!</h1>
    <p>Já me livrei da maldição</p>

    <script>
                 /* É possível usar somente Number sem o parseInt ou parseFloat*/
        var n1 = Number.parseFloat(window.prompt('Digite um número: ')) // string
        var n2 = Number.parseFloat(window.prompt('Digite outro número: ')) // string
        var s = n1 + n2
        window.alert(`A soma entre ${n1} e ${n2} é igual ${s}`)  //Concatenação
        // number + number para adição
        // string + string para concatenação

        /*Para conveter para uma string pode usar
            string(S)
            s.toString()
        */
        

    </script>
</body>
</html>
